<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易邮箱6.0 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-bg"></div>
    <div class="page-container">
        <!-- 1. Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo-area">
                        <!-- Inline SVG Logo for better compatibility -->
                        <svg width="220" height="40" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
                            <!-- 163 -->
                            <text x="0" y="34" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-style="italic" font-size="34" fill="#d81e06">163</text>
                            <!-- 网易邮箱 -->
                            <text x="70" y="34" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-weight="bold" font-size="24" fill="#333">网易邮箱</text>
                            <!-- 6.0 -->
                            <text x="175" y="34" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="24" fill="#d81e06">6.0</text>
                        </svg>
                        <span class="header-divider">|</span>
                        <span class="page-title">登录</span>
                    </div>
                </div>
                <div class="header-right">
                    <a href="https://mail.163.com/client/mobile.do" target="_blank">手机App下载</a>
                    <a href="https://mail.163.com/client/dl.do" target="_blank">电脑客户端下载</a>
                    <a href="https://vip.163.com/" target="_blank">VIP</a>
                    <a href="https://vip.163.com/" target="_blank">会员</a>
                    <a href="https://qiye.163.com/" target="_blank">企业邮箱</a>
                    <a href="https://hw.mail.163.com/" target="_blank">海外登录</a>
                    <span class="header-divider">|</span>
                    <a href="http://help.mail.163.com/faq.do?m=list&categoryID=1" target="_blank">帮助和反馈</a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- 4. Login Box -->
            <div class="login-box">
                <!-- 5. QR Code Corner -->
                <!-- 5. QR Code Corner -->
                <div class="qr-corner" onclick="toggleLoginMode()">
                    <div class="qr-tooltip" id="qrTooltip">
                        扫码登录
                        <div class="tooltip-arrow"></div>
                    </div>
                    <!-- QR icon 52x52 -->
                    <div class="qr-icon" id="qrToggleIcon">
                        <img src="images/qr_icon.png" alt="扫码登录" class="corner-img">
                    </div>
                </div>

                <div class="login-content">
                    <!-- Password Login View -->
                    <div id="password-login-view">
                        <!-- 5. Title -->
                        <h2 class="login-title">账号登录</h2>

                        <!-- 6. User Input -->
                        <div class="input-group user-group">
                            <div class="input-wrapper">
                                <input type="text" class="input-field" id="username" placeholder="邮箱账号或手机号码">
                                <span class="input-suffix">@163.com</span>
                            </div>
                        </div>

                        <!-- 7. Password Input -->
                        <div class="input-group password-group">
                            <div class="input-wrapper">
                                <input type="password" class="input-field" id="password" placeholder="输入密码">
                                <span class="eye-icon" onclick="togglePassword()" id="eyeIconWrapper">
                                    <!-- Default Closed Eye (Slash) -->
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#999" id="eyeIconSvg">
                                        <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
                                    </svg>
                                </span>
                            </div>
                        </div>

                        <!-- 8. Options -->
                        <div class="options-row">
                            <label class="checkbox-label">
                                <input type="checkbox"> 30天免登录
                            </label>
                            <a href="javascript:void(0)" class="forget-link" onclick="openHelpSearch('忘记密码')">忘记密码？</a>
                        </div>

                        <!-- Error message with help search link -->
                        <div class="error-message" id="loginErrorMessage" style="display: none;">
                            <span class="error-text"></span>
                            <a href="javascript:void(0)" class="error-help-link" onclick="openHelpSearchFromError()">
                                搜索帮助
                            </a>
                        </div>

                        <!-- 9. Login Button -->
                        <button class="login-btn" id="loginBtn">登 录</button>
                    </div>

                    <!-- QR Login View -->
                    <div id="qr-login-view" style="display: none;">
                        <div class="qr-main-container">
                            <h2 class="login-title">扫码登录</h2>
                            <div class="qr-text" style="text-align: center; color: #666; font-size: 12px; margin-bottom: 15px;">
                                请使用 <a href="#" style="color: #386F96; text-decoration: none;">网易邮箱App</a> 扫码登录
                            </div>
                            <div class="qr-code-img" style="text-align: center; margin-bottom: 10px;">
                                <img src="images/qr_icon.png" alt="二维码" style="width: 130px; height: 130px;">
                            </div>
                            <div class="qr-expired-tip" id="qrExpiredTip" style="display: none; text-align: center; margin-top: 10px;">
                                <span style="color: #ff4d4f; font-size: 12px;">二维码已过期</span>
                                <a href="javascript:void(0)" class="qr-refresh-link" onclick="refreshQrCode()">刷新</a>
                                <a href="javascript:void(0)" class="qr-help-link" onclick="openHelpSearch('二维码过期')">搜索帮助</a>
                            </div>
                            <div class="qr-timer" id="qrTimer" style="text-align: center; color: #999; font-size: 12px; margin-top: 10px;">
                                二维码有效期：<span id="qrCountdown">120</span>秒
                            </div>
                        </div>
                    </div>

                    <!-- 10. Register Links (Shared) -->
                    <div class="register-row">
                        <a href="https://mail.163.com/register/index.htm" target="_blank">注册新账号</a>
                        <span class="register-divider">|</span>
                        <a href="https://vip.163.com/register/index.htm" target="_blank">注册VIP</a>
                    </div>

                    <!-- 11. Footer inside box (Shared) -->
                    <div class="login-box-footer">
                        阅读并接受<a href="https://mail.163.com/html/mail_intro/service_clause.htm" target="_blank">《服务条款》</a>和<a href="https://mail.163.com/html/mail_intro/privacy_policy.htm" target="_blank">《隐私政策》</a>
                    </div>
                </div>
            </div>
        </main>

        <!-- 12. Page Footer -->
        <footer class="footer">
            <div class="footer-links">
                <a href="https://www.163.com/" target="_blank">网易首页</a>
                <span class="footer-divider">|</span>
                <a href="https://you.163.com/" target="_blank">网易严选</a>
                <span class="footer-divider">|</span>
                <a href="https://gongyi.163.com/" target="_blank">政府公益热线</a>
                <span class="footer-divider">|</span>
                <a href="https://corp.163.com/" target="_blank">网易公司版权所有</a>
            </div>
            <div class="footer-info">
                <span>© 1997-2026 网易公司版权所有</span>
                <span class="info-spacer"></span>
                <span class="record-icon">🛡️</span>
                <span>ICP备案信息</span>
            </div>
        </footer>
    </div>

    <!-- Help Center Modal / Drawer -->
    <div class="help-overlay" id="helpOverlay" onclick="closeHelpSearch(event)">
        <div class="help-panel" id="helpPanel" onclick="event.stopPropagation()">
            <div class="help-header">
                <h3 class="help-title">帮助中心</h3>
                <button class="help-close-btn" onclick="closeHelpSearch()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="#999">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="help-search-bar">
                <input type="text" class="help-search-input" id="helpSearchInput" placeholder="搜索帮助问题...">
                <button class="help-search-btn" onclick="searchHelp()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </button>
            </div>
            <div class="help-content">
                <div class="help-results" id="helpResults">
                    <div class="help-empty" id="helpEmpty">
                        <svg viewBox="0 0 24 24" width="48" height="48" fill="#ddd">
                            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <p>输入关键词搜索帮助</p>
                    </div>
                    <div class="help-list" id="helpList" style="display: none;"></div>
                </div>
                <div class="help-detail" id="helpDetail" style="display: none;">
                    <button class="help-back-btn" onclick="showHelpList()">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="#666">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                        返回
                    </button>
                    <h4 class="help-detail-title" id="helpDetailTitle"></h4>
                    <div class="help-detail-content" id="helpDetailContent"></div>
                </div>
            </div>
            <div class="help-footer">
                <a href="javascript:void(0)" class="help-contact-btn" onclick="contactCustomerService()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="#3370ff">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
                    </svg>
                    联系客服
                </a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
